apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: user
  name: user
  namespace: ecommerce
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - image: rahmaahmed2002/depi_gp-user-service:7
          name: user-service
          ports:
            - containerPort: 3001
          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-configmap
                  key: USER_MONGO_URI
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: ecommerce-configmap
                  key: REDIS_URL
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ecommerce-secrets
                  key: ACCESS_TOKEN
          resources:
            requests:
              memory: "200Mi"
              cpu: "200m"
            limits:
              memory: "500Mi"
              cpu: "500m"
          startupProbe:
            tcpSocket:
              port: 3001
              initialDelaySeconds: 5
              failureThreshold: 10
              periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /user
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /user
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: user
  name: user
  namespace: ecommerce
spec:
  ports:
    - port: 3001
      protocol: TCP
      targetPort: 3001
  selector:
    app: user
  type: ClusterIP
